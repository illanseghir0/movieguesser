name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4   # lit la version dans "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          # secrets du repo (Settings -> Secrets and variables -> Actions) ;
          # absents, le site se déploie sans profils/connexion
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.attempt1.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      # deploy-pages échoue parfois de façon transitoire ("try again later") :
      # première tentative tolérée, seconde si besoin
      - id: attempt1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.attempt1.outcome == 'failure'
        run: sleep 30
      - id: deployment
        if: steps.attempt1.outcome == 'failure'
        uses: actions/deploy-pages@v4
